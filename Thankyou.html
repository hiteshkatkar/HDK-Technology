<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IT Engineer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        height: 100vh;
        font-family: 'Segoe UI', sans-serif;
        overflow: hidden;
        background: linear-gradient(270deg, #ff7eb3, #ff758c, #42a5f5, #7ed957);
        background-size: 800% 800%;
        animation: gradientMove 12s ease infinite;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .container {
        text-align: center;
        backdrop-filter: blur(15px);
        background: rgba(255,255,255,0.1);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(255,255,255,0.3);
        animation: fadeIn 2s ease;
    }

    h1 {
        font-size: 3em;
        margin-bottom: 10px;
        animation: float 3s ease-in-out infinite;
    }

    p {
        font-size: 1.2em;
        opacity: 0.9;
    }

    .btn-group {
        margin-top: 20px;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        font-size: 1em;
        cursor: pointer;
        transition: 0.3s;
        margin: 5px;
    }

    .primary-btn {
        background: white;
        color: #ff4081;
    }

    .primary-btn:hover {
        transform: scale(1.1);
        background: #ff4081;
        color: white;
    }

    .secondary-btn {
        background: transparent;
        border: 2px solid white;
        color: white;
    }

    .secondary-btn:hover {
        background: white;
        color: #333;
        transform: scale(1.1);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .particle {
        position: absolute;
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        opacity: 0.6;
        animation: floatUp linear infinite;
    }

    @keyframes floatUp {
        from {
            transform: translateY(100vh) scale(1);
            opacity: 0;
        }
        to {
            transform: translateY(-10vh) scale(1.5);
            opacity: 1;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>⚡Thank You for your Query 🖥️</h1>
    <p>Your query has been routed to us. We will review it shortly.</p>
    
    <p>We have resolved your problem in 48 Hours.</p>
    <div class="btn-group">
        <button class="primary-btn" onclick="showMessage()">Surprise 🎁</button>
        <button class="secondary-btn" onclick="goHome()">🏠 Back to Home</button>
    </div>

    <p id="message"></p>
</div>

<script>
    function showMessage() {
        const messages = [
            "You're amazing! 🌟",
            "Grateful for you 🙏",
            "You made this possible 💡",
            "Endless thanks 💖",
            "You're the real MVP 🏆"
        ];
        const random = messages[Math.floor(Math.random() * messages.length)];
        document.getElementById("message").innerText = random;
    }

    function goHome() {
        // Change this to your homepage URL
        window.location.href = "https://hdktechnology.vercel.app/";
    }

    function createParticle() {
        const particle = document.createElement("div");
        particle.classList.add("particle");

        particle.style.left = Math.random() * window.innerWidth + "px";
        particle.style.animationDuration = (Math.random() * 3 + 2) + "s";
        particle.style.width = particle.style.height = (Math.random() * 6 + 4) + "px";

        document.body.appendChild(particle);

        setTimeout(() => {
            particle.remove();
        }, 5000);
    }

    setInterval(createParticle, 200);
</script>

</body>
</html>
